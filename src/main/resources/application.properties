# Server configuration
server.port=8080

# FFmpeg configuration (optional - set path to ffmpeg executable if needed)
# ffmpeg.path=C:\\Program Files\\ffmpeg\\bin\\ffmpeg.exe

# Logging
logging.level.ru.streamer=INFO
logging.level.reactor.netty=INFO
logging.level.ru.streamer.service.FfmpegService=DEBUG

# Spring Boot shutdown configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
