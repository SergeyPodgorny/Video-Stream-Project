# Server configuration
server.port=8080

# FFmpeg configuration
# ffmpeg.path - не требуется, приложение автоматически найдёт ffmpeg в PATH или стандартных путях

# Logging
logging.level.ru.streamer=INFO
logging.level.reactor.netty=INFO
logging.level.ru.streamer.service.FfmpegService=DEBUG

# Spring Boot shutdown configuration
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
