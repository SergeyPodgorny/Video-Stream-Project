<!doctype html>
<html lang="ru">
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <title>Home movie theatre</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .logo {
            width: 48px;
            height: 48px;
        }
        .video-info {
            margin-bottom: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .transcoding-warning {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.svg" alt="Логотип" class="logo">
        <a href="/index.html">Назад</a>
    </div>

    <div id="video-info" class="video-info"></div>
    <div id="transcoding-warning" class="transcoding-warning" style="display: none;">
        ⚠️ Видео требует транскодировки. Начало воспроизведения может занять несколько секунд.
    </div>

    <div id="video-container"></div>

  <script src="/scripts/render-video-player.js"></script>



  <script src="https://vjs.zencdn.net/8.10.0/video.min.js">
    window.HELP_IMPROVE_VIDEOJS = false;
  </script>

</body>
</html>
